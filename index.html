<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Proyecto AR - MindAR</title>

  <!-- A-Frame + Extras (animation-mixer) + MindAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
    }

    a-scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    video, canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      position: absolute !important;
      top: 0;
      left: 0;
    }

    /* Ocultar botón VR de A-Frame */
    .a-enter-vr, .a-enter-ar,
    #arButton, [id^="aframe"] .a-enter-vr {
      display: none !important;
    }

    /* Controles simplificados - solo 2 botones */
    #view-controls {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
      z-index: 9999;
    }

    .vc-btn {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.3);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .vc-btn:active {
      transform: scale(0.95);
    }

    .vc-btn[aria-pressed="true"] {
      background: rgba(66, 153, 225, 0.9);
      border-color: rgba(66, 153, 225, 1);
      box-shadow: 0 0 15px rgba(66, 153, 225, 0.6);
    }

    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      color: white;
      font-family: Arial, sans-serif;
      flex-direction: column;
      gap: 20px;
    }

    #loading-overlay.hidden {
      display: none;
    }

    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #4299e1;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Overlay de escaneo */
    #scan-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 9000;
    }
    #scan-frame {
      position: relative;
      width: min(80vw, 500px);
      height: min(60vh, 350px);
      border: 4px solid rgba(66,153,225,0.9);
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(66,153,225,0.5), inset 0 0 20px rgba(66,153,225,0.3);
      overflow: hidden;
      backdrop-filter: blur(2px);
    }
    #scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(66,153,225,1), transparent);
      box-shadow: 0 0 12px rgba(66,153,225,0.9);
      animation: scan 2.2s linear infinite;
    }
    @keyframes scan {
      0% { top: 8px; }
      50% { top: calc(100% - 11px); }
      100% { top: 8px; }
    }
    #scan-overlay.hidden { display: none; }
  </style>
</head>
<body>

  <!-- Overlay de carga -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div>Iniciando AR...</div>
  </div>

  <!-- Overlay de escaneo -->
  <div id="scan-overlay">
    <div id="scan-frame">
      <div id="scan-line"></div>
    </div>
  </div>

  <!--
    Componente A-Frame: gestos táctiles para mover/escalar/rotar modelos 3D.
    Se registra ANTES de que la escena se cree.
  -->
  <script>
    AFRAME.registerComponent('gesture-handler', {
      schema: {
        rotationSpeed: { default: 0.4 }
      },

      init: function () {
        this.initialScale = null;
        this.currentScaleRatio = 1;
        this.prevTouchPos = null;
        this.pinchStartDist = 0;

        this.onTouchStart = this.onTouchStart.bind(this);
        this.onTouchMove = this.onTouchMove.bind(this);
        this.onTouchEnd = this.onTouchEnd.bind(this);

        this.el.sceneEl.addEventListener('touchstart', this.onTouchStart, { passive: false });
        this.el.sceneEl.addEventListener('touchmove', this.onTouchMove, { passive: false });
        this.el.sceneEl.addEventListener('touchend', this.onTouchEnd);
      },

      onTouchStart: function (e) {
        if (!this.el.object3D.visible) return;

        if (!this.initialScale) {
          this.initialScale = this.el.object3D.scale.clone();
        }

        if (e.touches.length === 1) {
          this.prevTouchPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        if (e.touches.length === 2) {
          this.pinchStartDist = this._dist(e.touches[0], e.touches[1]);
        }
      },

      onTouchMove: function (e) {
        if (!this.el.object3D.visible) return;
        e.preventDefault();

        // 1 dedo: rotar sobre eje Y (arrastrar horizontal)
        if (e.touches.length === 1 && this.prevTouchPos) {
          var dx = e.touches[0].clientX - this.prevTouchPos.x;
          this.el.object3D.rotation.y += dx * this.data.rotationSpeed * (Math.PI / 180);
          this.prevTouchPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }

        // 2 dedos: pinch para acercar/alejar
        if (e.touches.length === 2) {
          var dist = this._dist(e.touches[0], e.touches[1]);
          var ratio = dist / this.pinchStartDist;
          var newScale = this.currentScaleRatio * ratio;
          newScale = Math.max(0.05, Math.min(newScale, 10));
          this.el.object3D.scale.set(
            this.initialScale.x * newScale,
            this.initialScale.y * newScale,
            this.initialScale.z * newScale
          );
        }
      },

      onTouchEnd: function (e) {
        this.prevTouchPos = null;
        if (e.touches.length < 2 && this.initialScale) {
          this.currentScaleRatio = this.el.object3D.scale.x / this.initialScale.x;
          if (e.touches.length === 1) {
            this.prevTouchPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
          }
        }
      },

      _dist: function (a, b) {
        return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
      }
    });
  </script>

  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ./marcadores/targets.mind; autoStart: false; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 10;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; precision: medium; alpha: true;"
    embedded
  >
    <a-assets id="dynamic-assets"></a-assets>
    <a-entity id="dynamic-anchors"></a-entity>

    <!-- Iluminación -->
    <a-entity light="type: ambient; intensity: 0.8"></a-entity>
    <a-entity light="type: directional; intensity: 0.6" position="1 1 1"></a-entity>

    <!-- Cámara -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  </a-scene>

  <div id="view-controls" role="toolbar" aria-label="Controles de vista">
    <button id="mode-transparent" class="vc-btn" aria-pressed="false">Camara</button>
    <button id="mode-black" class="vc-btn" aria-pressed="true">Fondo Negro</button>
  </div>

  <script>
    const AR_ITEMS_DEFAULT = [
      {
        targetIndex: 0,
        imagen: './imagenes/portada0.png',
        modelo: './modelos/portada.glb',
        titulo: 'Frutas y Verduras',
        escala: '0.7 0.7 0.7',
        posicion: '0 0 0',
        rotacion: '0 0 0'
      },
      {
        targetIndex: 1,
        imagen: './imagenes/procesodealimentos1.png',
        modelo: './modelos/proceso.glb',
        titulo: 'Venta de productos',
        escala: '0.7 0.7 0.7',
        posicion: '0 0 0',
        rotacion: '0 0 0'
      }
    ];

    let AR_ITEMS = AR_ITEMS_DEFAULT.slice();

    (function(){
      let arSystem = null;
      let sceneEl = null;
      let currentMode = 'black';
      let threeRenderer = null;

      // Set de targets activos para controlar el scan overlay de forma fiable
      const activeTargets = new Set();

      async function loadARItems() {
        const jsonUrl = `./ar_items.json?v=${Date.now()}`;
        try {
          const response = await fetch(jsonUrl);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const data = await response.json();
          if (!Array.isArray(data)) throw new Error('ar_items.json debe contener un arreglo.');

          if (data.length > 0) {
            AR_ITEMS = data;
            console.log(`Configuracion AR cargada (global): ${AR_ITEMS.length} item(s).`);
          } else {
            console.warn('ar_items.json esta vacio, usando datos por defecto.');
            AR_ITEMS = AR_ITEMS_DEFAULT.slice();
          }
        } catch (error) {
          console.warn('No se pudo cargar ar_items.json, usando datos por defecto:', error.message);
          AR_ITEMS = AR_ITEMS_DEFAULT.slice();
        }
      }

      function buildDynamicARContent() {
        const assetsEl = document.getElementById('dynamic-assets');
        const anchorsRoot = document.getElementById('dynamic-anchors');

        if (!assetsEl || !anchorsRoot) {
          console.error('No se encontro contenedor dinamico para assets/anchors.');
          return;
        }

        assetsEl.innerHTML = '';
        anchorsRoot.innerHTML = '';

        const normalizedItems = AR_ITEMS
          .filter(item => Number.isInteger(item.targetIndex) && item.modelo)
          .sort((a, b) => a.targetIndex - b.targetIndex);

        normalizedItems.forEach((item) => {
          const anchor = document.createElement('a-entity');
          anchor.setAttribute('id', `anchor-${item.targetIndex}`);
          anchor.setAttribute('mindar-image-target', `targetIndex: ${item.targetIndex}`);

          const model = document.createElement('a-gltf-model');
          model.setAttribute('id', `model-${item.targetIndex}`);
          model.setAttribute('position', item.posicion || '0 0 0');
          model.setAttribute('rotation', item.rotacion || '0 0 0');
          model.setAttribute('scale', item.escala || '0.7 0.7 0.7');
          model.setAttribute('visible', 'false');
          model.setAttribute('animation-mixer', '');
          model.setAttribute('gesture-handler', '');
          model.dataset.modelSrc = item.modelo;
          model.dataset.modelFallback = item.modeloFallback || '';
          model.dataset.modelRequested = 'false';
          model.dataset.modelReady = 'false';

          model.addEventListener('model-loaded', () => {
            model.dataset.modelReady = 'true';
            model.setAttribute('visible', 'true');
          });

          model.addEventListener('model-error', () => {
            const fallback = model.dataset.modelFallback;
            const currentSrc = model.getAttribute('src') || '';

            if (fallback && currentSrc !== fallback) {
              console.warn(`Modelo principal fallo para target ${item.targetIndex}. Usando fallback.`);
              model.dataset.modelRequested = 'true';
              model.dataset.modelReady = 'false';
              model.setAttribute('src', fallback);
              return;
            }

            console.error(`No se pudo cargar modelo para target ${item.targetIndex}: ${currentSrc || model.dataset.modelSrc}`);
          });

          anchor.appendChild(model);

          if (item.titulo) {
            const text = document.createElement('a-text');
            text.setAttribute('value', item.titulo);
            text.setAttribute('position', '0 0.8 0');
            text.setAttribute('align', 'center');
            text.setAttribute('color', '#FFFFFF');
            text.setAttribute('scale', '0.8 0.8 0.8');
            anchor.appendChild(text);
          }

          anchorsRoot.appendChild(anchor);
        });

        console.log(`AR_ITEMS cargados: ${normalizedItems.length}`);
      }

      function updateScanOverlay() {
        const scanOverlay = document.getElementById('scan-overlay');
        if (!scanOverlay) return;
        if (activeTargets.size > 0) {
          scanOverlay.classList.add('hidden');
        } else {
          scanOverlay.classList.remove('hidden');
        }
      }

      async function initAR() {
        sceneEl = document.getElementById('scene');

        const waitSceneLoaded = sceneEl.hasLoaded
          ? Promise.resolve()
          : new Promise((resolve) => {
              sceneEl.addEventListener('loaded', resolve, { once: true });
            });

        await loadARItems();
        buildDynamicARContent();

        try {
          await waitSceneLoaded;
          console.log('Escena cargada');

          arSystem = sceneEl.systems['mindar-image-system'];
          if (!arSystem) {
            throw new Error('No se encontro mindar-image-system en la escena.');
          }

          await Promise.race([
            arSystem.start(),
            new Promise((_, reject) => {
              setTimeout(() => reject(new Error('Timeout iniciando MindAR.')), 15000);
            })
          ]);
          console.log('MindAR iniciado');

            threeRenderer = sceneEl.renderer;
            if (threeRenderer) {
              try {
                threeRenderer.setClearColor(0x000000, 1);
              } catch(e) {}
            }

            const anchors = Array.from(document.querySelectorAll('[mindar-image-target]'));

            anchors.forEach((anchor) => {
              const targetId = anchor.getAttribute('id') || 'target';

              anchor.addEventListener('targetFound', () => {
                activeTargets.add(targetId);
                console.log(`targetFound -> ${targetId}`);

                const modelEl = anchor.querySelector('a-gltf-model');
                if (modelEl) {
                  if (modelEl.dataset.modelRequested !== 'true') {
                    modelEl.dataset.modelRequested = 'true';
                    modelEl.setAttribute('src', modelEl.dataset.modelSrc || '');
                  }
                  if (modelEl.dataset.modelReady === 'true') {
                    modelEl.setAttribute('visible', 'true');
                  }
                }

                updateScanOverlay();
              });

              anchor.addEventListener('targetLost', () => {
                activeTargets.delete(targetId);
                console.log(`targetLost -> ${targetId}`);

                const modelEl = anchor.querySelector('a-gltf-model');
                if (modelEl) {
                  modelEl.setAttribute('visible', 'false');
                }

                updateScanOverlay();
              });
            });

            document.getElementById('loading-overlay').classList.add('hidden');
            updateScanOverlay();
            setMode(currentMode);

        } catch (error) {
          console.error('Error al iniciar MindAR:', error);
          document.getElementById('loading-overlay').innerHTML =
            '<div>Error al iniciar AR</div><div style="font-size: 12px; margin-top: 10px;">Verifica camara, permisos y que exista ./marcadores/targets.mind</div>';
        }
      }

      function getMediaElements() {
        return {
          videos: Array.from(document.querySelectorAll('video')),
          canvases: Array.from(document.querySelectorAll('canvas'))
        };
      }

      function setMode(mode) {
        currentMode = mode;
        const { videos, canvases } = getMediaElements();

        [...videos, ...canvases].forEach(el => {
          el.style.display = 'block';
          el.style.visibility = 'visible';
          el.style.width = '100%';
          el.style.height = '100%';
          el.style.objectFit = 'cover';
          el.style.top = '0';
          el.style.left = '0';
          el.style.position = 'absolute';
        });

        if (mode === 'transparent') {
          document.body.style.background = 'transparent';
          if (threeRenderer && threeRenderer.setClearColor) {
            try { threeRenderer.setClearColor(0x000000, 0); } catch(e) {}
          }
        } else if (mode === 'black') {
          document.body.style.background = '#000';
          if (threeRenderer && threeRenderer.setClearColor) {
            try { threeRenderer.setClearColor(0x000000, 1); } catch(e) {}
          }
        }

        document.querySelectorAll('.vc-btn').forEach(btn => {
          btn.setAttribute('aria-pressed', 'false');
        });
        const activeBtn = document.getElementById(`mode-${mode}`);
        if (activeBtn) activeBtn.setAttribute('aria-pressed', 'true');
      }

      window.addEventListener('load', function() {
        initAR();

        document.getElementById('mode-transparent').addEventListener('click', () => {
          setMode('transparent');
        });

        document.getElementById('mode-black').addEventListener('click', () => {
          setMode('black');
        });
      });

      window.addEventListener('beforeunload', () => {
        if (arSystem) {
          arSystem.stop();
        }
      });
    })();
  </script>

</body>
</html>
